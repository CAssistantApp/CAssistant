name: CAssistant
options:
  bundleIdPrefix: com.cassistant
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  
settings:
  SWIFT_VERSION: "5.9"
  SWIFT_STRICT_CONCURRENCY: targeted
  
targets:
  CAssistant:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: CAssistant
    settings:
      base:
        INFOPLIST_FILE: CAssistant/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.cassistant.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        COMPRESS_PNGS: NO
        STRIP_INSTALLED_PRODUCT: NO
        COPY_PHASE_STRIP: NO
    info:
      path: CAssistant/Info.plist
    entitlements:
      path: CAssistant/CAssistant.entitlements
    resources:
      - CAssistant/Resources